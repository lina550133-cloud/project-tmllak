<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - تملك</title>
    <link rel="stylesheet" href="design.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li class="active">الرئيسية</li>
                    <li>السجلات</li>
                    <li>المستندات</li>
                    <li>قائمة المهام</li>
                </ul>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="🔍 مساحة العمل">
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1 class="page-title">الرئيسية</h1>
            </header>

            <section class="cards-wrapper">
                
                <div class="stats-container hover-effect">
                    <div class="stat-row"><span>•</span> المهام المتأخرة</div>
                    <div class="stat-row"><span>•</span> الرسائل الجديدة</div>
                    <div class="stat-row"><span>•</span> العقود</div>
                </div>

                <div class="card tasks-card hover-effect">
                    <div class="card-header">
                        <span class="badge">08</span>
                        <h3>المهام</h3>
                    </div>
                    <ul class="task-list">
                        <li>المهمة ١</li>
                        <li>المهمة ٢</li>
                        <li>المهمة ٣</li>
                    </ul>
                </div>

            </section>

            <section class="logo-area">
                <div class="image-wrapper">
                    <img src="logo.png.png" alt="Logo" class="main-logo">
                </div>
                <p class="welcome-msg">
                    مرحباً بك في لوحة التحكم شركة تملك العمران العقارية، لننطلق اليوم <br>
                    بشكل منتج ونتابع مهام عقاراتنا بسلاسة!
                </p>
            </section>
        </main>
    </div>

</body>
</html>
